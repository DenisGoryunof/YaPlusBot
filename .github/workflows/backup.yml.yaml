name: Backup Data

on:
  schedule:
    - cron: '0 0 * * *'  # Ежедневно в полночь
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Backup data
        run: |
          flyctl ssh console -C "tar -czf /tmp/backup.tar.gz /persistent"
          flyctl ssh console -C "cat /tmp/backup.tar.gz" > backup-${{ github.run_id }}.tar.gz
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
      - name: Upload backup
        uses: actions/upload-artifact@v3
        with:
          name: data-backup
          path: backup-*.tar.gz